name: rag_chatbot_app
description: "A Flutter application for a RAG-based chatbot with Firebase integration, audio recording, and file handling capabilities. This app allows users to interact with a chatbot, manage conversations, and utilize various features such as audio recording and file uploads."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.0
  google_sign_in: ^6.2.1

  # HTTP
  dio: ^5.5.0

  # Audio
  just_audio: ^0.9.40
  record: ^5.1.0

  # File picking
  file_picker: ^8.0.0
  image_picker: ^1.1.2

  # Local storage
  shared_preferences: ^2.3.1
  hive_flutter: ^1.1.0

  # UI
  flutter_markdown: ^0.7.1
  lottie: ^3.1.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_animate: ^4.5.0

  # Utilities
  uuid: ^4.4.2
  timeago: ^3.6.1
  intl: ^0.19.0
  permission_handler: ^11.3.1
  go_router: ^17.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/google_logo.png